# Group F — Smart Waste Management System
# Vault Bootstrap Job
#
# Handles first-boot (init + unseal + seed) and re-runs (unseal + re-seed).
# Safe to run multiple times — all steps are idempotent.
#
# Usage: kubectl apply -f auth/vault/vault-policies.yaml -n auth

---
# ─── Bootstrap script ─────────────────────────────────────────────
apiVersion: v1
kind: ConfigMap
metadata:
  name: vault-bootstrap-script
  namespace: auth
  labels:
    project: group-f-swms
    managed-by: f4-platform
data:
  bootstrap.sh: |
    #!/bin/sh
    set -e

    VAULT_ADDR="http://vault.auth.svc.cluster.local:8200"
    SA_TOKEN=$(cat /var/run/secrets/kubernetes.io/serviceaccount/token 2>/dev/null || echo "")
    K8S_API="https://kubernetes.default.svc"
    SECRET_NAME="vault-init-keys"
    NAMESPACE="auth"

    export VAULT_ADDR HOME=/tmp

    echo "======================================================"
    echo " SWMS — Vault Bootstrap"
    echo " Vault: $VAULT_ADDR"
    echo "======================================================"

    # ── Wait for Vault HTTP ───────────────────────────────────────
    echo "[1/7] Waiting for Vault..."
    until wget -qO- "${VAULT_ADDR}/v1/sys/health?standbyok=true" >/dev/null 2>&1; do
      echo "  Not ready, retrying in 3s..."
      sleep 3
    done
    echo "  Vault is reachable."

    # ── Init (first boot only) ────────────────────────────────────
    echo "[2/7] Checking initialization..."
    INITIALIZED=$(wget -qO- "${VAULT_ADDR}/v1/sys/health" 2>/dev/null | grep -o '"initialized":[a-z]*' | cut -d: -f2 || echo "false")

    if [ "$INITIALIZED" = "false" ]; then
      echo "  First boot — initializing Vault..."
      INIT_JSON=$(wget -qO- \
        --header="Content-Type: application/json" \
        --post-data='{"secret_shares":1,"secret_threshold":1}' \
        "${VAULT_ADDR}/v1/sys/init" 2>/dev/null || echo "")

      UNSEAL_KEY=$(echo "$INIT_JSON" | grep -o '"keys_base64":\["[^"]*"' | sed 's/.*\["\([^"]*\)".*/\1/')
      ROOT_TOKEN=$(echo "$INIT_JSON" | grep -o '"root_token":"[^"]*"' | cut -d'"' -f4)

      if [ -z "$UNSEAL_KEY" ] || [ -z "$ROOT_TOKEN" ]; then
        echo "  ERROR: init failed. Response: $INIT_JSON"
        exit 1
      fi

      echo "  Vault initialized. Saving keys to Secret ${SECRET_NAME}..."

      UNSEAL_B64=$(printf '%s' "$UNSEAL_KEY" | base64 | tr -d '\n')
      TOKEN_B64=$(printf '%s' "$ROOT_TOKEN" | base64 | tr -d '\n')

      wget -qO- --no-check-certificate \
        --header="Authorization: Bearer ${SA_TOKEN}" \
        --header="Content-Type: application/json" \
        --post-data="{\"apiVersion\":\"v1\",\"kind\":\"Secret\",\"metadata\":{\"name\":\"${SECRET_NAME}\",\"namespace\":\"${NAMESPACE}\"},\"data\":{\"unseal_key\":\"${UNSEAL_B64}\",\"root_token\":\"${TOKEN_B64}\"}}" \
        "${K8S_API}/api/v1/namespaces/${NAMESPACE}/secrets" >/dev/null 2>&1 || true

      echo "  Keys saved to ${SECRET_NAME} Secret."
    else
      echo "  Already initialized."
      ROOT_TOKEN=$(wget -qO- --no-check-certificate \
        --header="Authorization: Bearer ${SA_TOKEN}" \
        "${K8S_API}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}" 2>/dev/null \
        | grep '"root_token"' | sed 's/.*"root_token":"\([^"]*\)".*/\1/' | base64 -d 2>/dev/null || echo "")
      UNSEAL_KEY=$(wget -qO- --no-check-certificate \
        --header="Authorization: Bearer ${SA_TOKEN}" \
        "${K8S_API}/api/v1/namespaces/${NAMESPACE}/secrets/${SECRET_NAME}" 2>/dev/null \
        | grep '"unseal_key"' | sed 's/.*"unseal_key":"\([^"]*\)".*/\1/' | base64 -d 2>/dev/null || echo "")
    fi

    # ── Unseal ───────────────────────────────────────────────────
    echo "[3/7] Checking seal status..."
    SEALED=$(wget -qO- "${VAULT_ADDR}/v1/sys/health" 2>/dev/null | grep -o '"sealed":[a-z]*' | cut -d: -f2 || echo "true")

    if [ "$SEALED" = "true" ]; then
      echo "  Unsealing..."
      wget -qO- \
        --header="Content-Type: application/json" \
        --post-data="{\"key\":\"${UNSEAL_KEY}\"}" \
        "${VAULT_ADDR}/v1/sys/unseal" >/dev/null 2>&1
      sleep 2
      echo "  Unsealed."
    else
      echo "  Already unsealed."
    fi

    export VAULT_TOKEN="$ROOT_TOKEN"

    # ── Enable KV v2 ─────────────────────────────────────────────
    echo "[4/7] Enabling KV v2 secrets engine..."
    vault secrets enable -version=2 -path=secret kv 2>/dev/null || echo "  Already enabled."

    # ── Seed secrets ─────────────────────────────────────────────
    echo "[5/7] Seeding secrets..."

    vault kv put secret/swms/kafka \
      sasl_username="user1" \
      sasl_password="QA7aKGtPHV" \
      bootstrap_server="kafka.messaging.svc.cluster.local:9092" \
      security_protocol="SASL_PLAINTEXT" \
      sasl_mechanism="SCRAM-SHA-256"

    vault kv put secret/swms/keycloak \
      admin_user="admin" \
      admin_password="swms-admin-dev-2026" \
      realm_name="waste-management" \
      service_url="http://keycloak.auth.svc.cluster.local/auth"

    vault kv put secret/swms/postgres \
      keycloak_db_password="swms-kc-dev-2026" \
      postgres_password="swms-pg-dev-2026" \
      keycloak_db_url="jdbc:postgresql://keycloak-postgresql.auth.svc.cluster.local:5432/bitnami_keycloak"

    vault kv put secret/swms/postgres-waste \
      password="waste_admin_password"

    vault kv put secret/swms/influxdb \
      token="my-super-token"

    vault kv put secret/swms/emqx \
      dashboard_username="admin" \
      dashboard_password="swms-emqx-dev-2026" \
      sensor_password="swms-sensor-dev-2026" \
      edge_password="swms-edge-dev-2026" \
      admin_password="swms-f1-admin-2026"

    # ── Seed Hyperledger Fabric secrets ──────────────────────
    echo "[5b/7] Seeding secrets at secret/swms/hyperledger..."
    # Placeholder values — overwritten by fabric-setup Job once crypto is generated.
    vault kv put secret/swms/hyperledger \
      channel_name="waste-collection-channel" \
      chaincode_name="collection-record" \
      chaincode_version="1.0" \
      msp_id="WasteMgmtMSP" \
      peer_endpoint="peer0.blockchain.svc.cluster.local:7051" \
      orderer_endpoint="orderer.blockchain.svc.cluster.local:7050" \
      admin_cert_path="/etc/fabric/identity/cert.pem" \
      admin_key_path="/etc/fabric/identity/key.pem" \
      peer_tlsca_path="/etc/fabric/tls/peer-tlsca.pem"
    echo "  ✅ Hyperledger secrets stored."

    echo "  All secrets seeded."

    # ── Policies ─────────────────────────────────────────────────
    echo "[6/7] Writing policies..."

    vault policy write platform-admin - <<EOF
    path "secret/data/swms/*" { capabilities = ["create","read","update","delete","list"] }
    path "secret/metadata/swms/*" { capabilities = ["list","read"] }
EOF

    vault policy write kafka-consumer - <<EOF
    path "secret/data/swms/kafka" { capabilities = ["read"] }
EOF

    vault policy write keycloak-service - <<EOF
    path "secret/data/swms/keycloak" { capabilities = ["read"] }
    path "secret/data/swms/postgres" { capabilities = ["read"] }
EOF

    vault policy write eso-service - <<EOF
    path "secret/data/swms/*" { capabilities = ["read"] }
EOF

    # Hyperledger service: read-only access to Fabric connection config
    vault policy write hyperledger-service - <<EOF
    path "secret/data/swms/hyperledger" {
      capabilities = ["read"]
    }
    EOF
    echo "  ✅ Policy 'hyperledger-service' created."

    echo "  Policies written."

    # ── Kubernetes auth ───────────────────────────────────────────
    echo "[7/7] Configuring Kubernetes auth..."
    vault auth enable kubernetes 2>/dev/null || echo "  Already enabled."
    vault write auth/kubernetes/config \
      kubernetes_host="https://${KUBERNETES_SERVICE_HOST}:${KUBERNETES_SERVICE_PORT}"

    vault write auth/kubernetes/role/platform-admin \
      bound_service_account_names="vault-admin" \
      bound_service_account_namespaces="auth" \
      policies="platform-admin" token_ttl="1h"

    vault write auth/kubernetes/role/kafka-consumer \
      bound_service_account_names="default" \
      bound_service_account_namespaces="waste-dev,waste-prod,messaging" \
      policies="kafka-consumer" token_ttl="2h"

    vault write auth/kubernetes/role/keycloak-service \
      bound_service_account_names="default" \
      bound_service_account_namespaces="waste-dev,waste-prod,auth" \
      policies="keycloak-service" token_ttl="2h"

    vault write auth/kubernetes/role/eso-service \
      bound_service_account_names="external-secrets" \
      bound_service_account_namespaces="eso" \
      policies="eso-service" token_ttl="2h"

    # hyperledger-service: for F4 blockchain API wrapper
    vault write auth/kubernetes/role/hyperledger-service \
      bound_service_account_names="default" \
      bound_service_account_namespaces="blockchain" \
      policies="hyperledger-service" \
      token_ttl="2h"
    echo "  ✅ Role 'hyperledger-service' created."

    echo ""
    echo "======================================================"
    echo " ✅ Vault Bootstrap Complete!"
    echo " Root Token: $VAULT_TOKEN"
    echo " UI: http://localhost:30820 (via minikube service)"
    echo ""
    echo " Secrets seeded:"
    echo "   secret/swms/kafka        — SASL credentials"
    echo "   secret/swms/keycloak     — Admin credentials"
    echo "   secret/swms/postgres     — DB passwords"
    echo "   secret/swms/postgres-waste — Waste DB password"
    echo "   secret/swms/influxdb     — InfluxDB token"
    echo "   secret/swms/emqx         — MQTT credentials"
    echo "   secret/swms/hyperledger  — Fabric connection config"
    echo ""
    echo " Kubernetes auth roles:"
    echo "   platform-admin      → auth namespace"
    echo "   kafka-consumer      → waste-dev, waste-prod, messaging"
    echo "   keycloak-service    → waste-dev, waste-prod, auth"
    echo "   eso-service         → eso namespace"
    echo "   hyperledger-service → blockchain namespace"
    echo "======================================================"

---
# ─── ServiceAccount for bootstrap Job ─────────────────────────────
apiVersion: v1
kind: ServiceAccount
metadata:
  name: vault-bootstrap
  namespace: auth
  labels:
    project: group-f-swms
    managed-by: f4-platform

---
# ─── RBAC: bootstrap Job can manage vault-init-keys Secret ────────
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-bootstrap-secret-manager
  namespace: auth
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-init-keys"]
    verbs: ["get", "create", "update", "patch"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-bootstrap-secret-manager
  namespace: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-bootstrap-secret-manager
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap
    namespace: auth

---
# ─── RBAC: Vault pod can read vault-init-keys for postStart hook ──
apiVersion: rbac.authorization.k8s.io/v1
kind: Role
metadata:
  name: vault-pod-secret-reader
  namespace: auth
rules:
  - apiGroups: [""]
    resources: ["secrets"]
    resourceNames: ["vault-init-keys"]
    verbs: ["get"]

---
apiVersion: rbac.authorization.k8s.io/v1
kind: RoleBinding
metadata:
  name: vault-pod-secret-reader
  namespace: auth
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: Role
  name: vault-pod-secret-reader
subjects:
  - kind: ServiceAccount
    name: vault
    namespace: auth

---
# ─── ClusterRoleBinding for Kubernetes auth token review ──────────
apiVersion: rbac.authorization.k8s.io/v1
kind: ClusterRoleBinding
metadata:
  name: vault-auth-delegator
  labels:
    project: group-f-swms
    managed-by: f4-platform
roleRef:
  apiGroup: rbac.authorization.k8s.io
  kind: ClusterRole
  name: system:auth-delegator
subjects:
  - kind: ServiceAccount
    name: vault-bootstrap
    namespace: auth

---
# ─── Bootstrap Job ────────────────────────────────────────────────
apiVersion: batch/v1
kind: Job
metadata:
  name: vault-bootstrap
  namespace: auth
  labels:
    project: group-f-swms
    managed-by: f4-platform
spec:
  ttlSecondsAfterFinished: 600
  backoffLimit: 5
  template:
    spec:
      restartPolicy: OnFailure
      serviceAccountName: vault-bootstrap
      containers:
        - name: vault-bootstrap
          image: hashicorp/vault:1.17
          command: ["/bin/sh", "/scripts/bootstrap.sh"]
          env:
            - name: VAULT_ADDR
              value: "http://vault.auth.svc.cluster.local:8200"
            - name: HOME
              value: "/tmp"
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          volumeMounts:
            - name: bootstrap-script
              mountPath: /scripts
      volumes:
        - name: bootstrap-script
          configMap:
            name: vault-bootstrap-script
            defaultMode: 0755
