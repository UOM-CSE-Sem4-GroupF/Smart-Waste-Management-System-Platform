# Production overrides for ml-service (Python/FastAPI, port 8000).
base-service:
  imagePullSecrets:
    - name: ghcr-pull-secret

  image:
    repository: ghcr.io/uom-cse-sem4-groupf/ml-service
    tag: latest
    pullPolicy: Always

  replicaCount: 2

  service:
    port: 8000

  resources:
    requests:
      cpu: 200m
      memory: 512Mi
    limits:
      cpu: 2000m
      memory: 2Gi

  hpa:
    enabled: true
    minReplicas: 2
    maxReplicas: 4
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 1

  livenessProbe:
    enabled: true
    httpGet:
      port: 8000
      path: /health

  readinessProbe:
    enabled: true
    httpGet:
      port: 8000
      path: /ready

  env:
    APP_ENV: "production"
    LOG_LEVEL: "INFO"
    # Disable fallback mode in production — real models must be available
    ML_SERVICE_FALLBACK_MODE: "false"
    MLFLOW_TRACKING_URI: ""
    POSTGRES_HOST: "postgres-waste-postgresql.waste-prod.svc.cluster.local"
    POSTGRES_PORT: "5432"
    POSTGRES_DB: "waste_management"
    POSTGRES_USER: "waste_admin"

  externalSecret:
    enabled: true
    vaultPath: swms/postgres-waste
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    data:
      - secretKey: POSTGRES_PASSWORD
        remoteRef: { key: swms/postgres-waste, property: password }
