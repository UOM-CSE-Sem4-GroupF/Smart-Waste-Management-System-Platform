apiVersion: chaos-mesh.org/v1alpha1
kind: NetworkChaos
metadata:
  name: api-network-latency
  namespace: waste-dev
spec:
  selector:
    labelSelectors:
      "app.kubernetes.io/name": "core-api" # Assuming this is the label for the core API
  mode: one
  action: latency
  duration: "1m"
  delay:
    latency: "100ms"
    correlation: "0"
    jitter: "0ms"
  scheduler:
    cron: "@every 1h"
