# Group F SWMS — Kong Declarative Configuration
# This file is loaded as a Kubernetes ConfigMap and mounted into Kong at startup.
# Kong runs in DB-less mode: all config lives here, not in a database.
#
# Applied via: kubectl apply -f gateway/kong/kong-config.yaml -n gateway
#
# ROUTE DESIGN:
#   All /api/v1/* routes are public-facing (through Kong, require CORS + rate-limiting)
#   All /internal/* routes are BLOCKED at Kong — services call each other directly via K8s DNS
#   /socket.io routes WebSocket/long-poll connections to notification-service
#
# Owner: F4 Platform Team

apiVersion: v1
kind: ConfigMap
metadata:
  name: kong-declarative-config
  namespace: gateway
  labels:
    project: group-f-swms
    managed-by: f4-platform
data:
  kong.yml: |
    _format_version: "3.0"
    _transform: true

    # =========================================================
    # UPSTREAM SERVICES
    # These are the DNS names of services inside the cluster.
    # Format: <service-name>.<namespace>.svc.cluster.local
    # Services must be deployed before Kong can route to them.
    # =========================================================

    services:
      # ---------------------------------------------------------
      # F3 — Bin Status Service
      # Serves all bin state and zone summary queries
      # ---------------------------------------------------------
      - name: bin-status
        url: http://bin-status-base-service.waste-dev.svc.cluster.local:3002
        connect_timeout: 3000
        read_timeout: 10000
        write_timeout: 10000
        routes:
          - name: bins-api
            paths:
              - /api/v1/bins
            strip_path: false
            methods:
              - GET
              - POST
              - PUT
              - PATCH
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - PUT
                    - PATCH
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 100
                  policy: local

          - name: zones-api
            paths:
              - /api/v1/zones
            strip_path: false
            methods:
              - GET
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

          - name: clusters-api
            paths:
              - /api/v1/clusters
            strip_path: false
            methods:
              - GET
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

          - name: bin-status-health
            paths:
              - /health/bin-status
            strip_path: true
            methods:
              - GET

      # ---------------------------------------------------------
      # F3 — Collection Workflow Orchestrator
      # Manages the full job lifecycle state machine
      # ---------------------------------------------------------
      - name: orchestrator
        url: http://orchestrator-base-service.waste-dev.svc.cluster.local:3001
        connect_timeout: 3000
        read_timeout: 30000
        write_timeout: 30000
        routes:
          - name: collection-jobs-api
            paths:
              - /api/v1/collection-jobs
            strip_path: false
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - PUT
                    - PATCH
                    - DELETE
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

      # ---------------------------------------------------------
      # F3 — Scheduler Service
      # Handles driver/vehicle assignment and job progress tracking
      # ---------------------------------------------------------
      - name: scheduler
        url: http://scheduler-base-service.waste-dev.svc.cluster.local:3003
        connect_timeout: 3000
        read_timeout: 15000
        write_timeout: 15000
        routes:
          - name: collections-api
            paths:
              - /api/v1/collections
            strip_path: false
            methods:
              - GET
              - POST
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

          - name: vehicles-api
            paths:
              - /api/v1/vehicles
            strip_path: false
            methods:
              - GET
              - POST
              - PUT
              - PATCH
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - PUT
                    - PATCH
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

          - name: drivers-api
            paths:
              - /api/v1/drivers
            strip_path: false
            methods:
              - GET
              - POST
              - PUT
              - PATCH
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - PUT
                    - PATCH
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

      # ---------------------------------------------------------
      # F2 — Core API Service
      # Zone management, bin clusters, route plans, analytics
      # ---------------------------------------------------------
      - name: core-api
        url: http://core-api-base-service.waste-dev.svc.cluster.local:8001
        connect_timeout: 3000
        read_timeout: 30000
        write_timeout: 10000
        routes:
          - name: data-analysis-api
            paths:
              - /data-analysis
            strip_path: true
            methods:
              - GET
              - POST
              - PUT
              - PATCH
              - DELETE
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - PUT
                    - PATCH
                    - DELETE
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

      # ---------------------------------------------------------
      # F2 — FastAPI ML Service
      # Fill-time predictions, zone generation, route scoring
      # ---------------------------------------------------------
      - name: ml-service
        url: http://ml-service-base-service.waste-dev.svc.cluster.local:8000
        connect_timeout: 3000
        read_timeout: 30000
        write_timeout: 10000
        routes:
          - name: ml-api
            paths:
              - /api/v1/ml
            strip_path: false
            methods:
              - GET
              - POST
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 30
                  policy: local

      # ---------------------------------------------------------
      # F4 — Blockchain API Wrapper
      # Immutable audit trail — query collection records by job ID or zone
      # POST /records is internal-only (F3 → blockchain namespace via K8s DNS)
      # GET  /records/* is public (Kong JWT-protected)
      # ---------------------------------------------------------
      - name: blockchain-api-wrapper
        url: http://blockchain-api-wrapper.blockchain.svc.cluster.local:8080
        connect_timeout: 5000
        read_timeout: 15000
        write_timeout: 10000
        routes:
          - name: blockchain-records-query
            paths:
              - /api/v1/records
            strip_path: false
            methods:
              - GET
            plugins:
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

          - name: blockchain-records-zone
            paths:
              - /api/v1/records/zone
            strip_path: false
            methods:
              - GET
            plugins:
              - name: rate-limiting
                config:
                  minute: 30
                  policy: local

      # ---------------------------------------------------------
      # F2 — Route Optimizer Service
      # Optimal collection route calculation
      # ---------------------------------------------------------
      - name: route-optimizer
        url: http://route-optimizer-base-service.waste-dev.svc.cluster.local:8083
        connect_timeout: 3000
        read_timeout: 60000
        write_timeout: 30000
        routes:
          - name: route-optimizer-api
            paths:
              - /api/v1/routes
            strip_path: false
            methods:
              - GET
              - POST
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 30
                  policy: local

      # ---------------------------------------------------------
      # F3 — Notification Service (WebSocket / Socket.IO)
      # Serves Socket.IO for live dashboard updates
      # Long read_timeout required for Socket.IO long-polling
      # ---------------------------------------------------------
      - name: notification
        url: http://notification-base-service.waste-dev.svc.cluster.local:3004
        connect_timeout: 3000
        read_timeout: 86400000
        write_timeout: 86400000
        routes:
          - name: websocket-api
            paths:
              - /socket.io
            strip_path: false
            # JWT is enforced at the Kong level (query param ?token=<jwt> or
            # Authorization: Bearer header). Socket.IO also validates internally
            # for defence-in-depth. Clients must pass the Keycloak access token
            # as ?token=<jwt> in the Socket.IO connection URL because the browser
            # WebSocket API cannot set custom headers on the upgrade request.
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600
              - name: rate-limiting
                config:
                  minute: 60
                  policy: local

      # ---------------------------------------------------------
      # F4 — Keycloak Authentication Server
      # Centralized IAM for the entire platform
      # ---------------------------------------------------------
      - name: keycloak
        url: http://keycloak.auth.svc.cluster.local:80
        connect_timeout: 5000
        read_timeout: 10000
        write_timeout: 10000
        routes:
          - name: keycloak-api
            paths:
              - /auth
            strip_path: false
            plugins:
              - name: cors
                config:
                  origins:
                    - "*"
                  methods:
                    - GET
                    - POST
                    - OPTIONS
                  headers:
                    - Authorization
                    - Content-Type
                  max_age: 3600

      # ---------------------------------------------------------
      # SECURITY: Block all /internal/* routes
      # Internal service-to-service calls use K8s DNS directly.
      # Any request reaching Kong for /internal/* is rejected.
      # ---------------------------------------------------------
      - name: internal-block
        url: http://127.0.0.1:1
        routes:
          - name: block-internal
            paths:
              - /internal
            strip_path: false
            plugins:
              - name: request-termination
                config:
                  status_code: 403
                  message: "Forbidden: Internal routes are not accessible via the API Gateway."

    # =========================================================
    # GLOBAL PLUGINS
    # Applied to every request passing through Kong
    # =========================================================
    plugins:
      # Structured request logging — visible in Kong logs
      - name: file-log
        config:
          path: /dev/stdout
          reopen: false

      # Correlation IDs for distributed tracing (Jaeger-compatible)
      - name: correlation-id
        config:
          header_name: X-Request-ID
          generator: uuid
          echo_downstream: true
