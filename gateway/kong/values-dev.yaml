# Kong API Gateway — Helm Values (Local Dev)
# Chart: kong/kong
# Deployed into: gateway namespace
# Mode: DB-less (declarative config via ConfigMap)

# DB-less mode — all config comes from the mounted ConfigMap
env:
  database: "off"
  # Tell Kong exactly where the declarative config file lives
  declarative_config: /kong_dbless/kong.yaml

# Mount the kong-declarative-config ConfigMap into /kong_dbless
deployment:
  kong:
    enabled: true

# Use the extraVolumes/Mounts approach supported by the kong chart
extraVolumes:
  - name: kong-declarative-config
    configMap:
      name: kong-declarative-config

extraVolumeMounts:
  - name: kong-declarative-config
    mountPath: /kong_dbless
    readOnly: true

# Enable the Ingress Controller to watch K8s Ingress resources
ingressController:
  enabled: true
  installCRDs: false
  env:
    kong_admin_tls_skip_verify: "true"

# Single replica for local dev
replicaCount: 1

# Expose Kong proxy via NodePort so Minikube can reach it
proxy:
  type: NodePort
  http:
    enabled: true
    nodePort: 30080
  tls:
    enabled: false

# Kong Admin API — cluster-internal only (no external exposure)
admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    containerPort: 8001
  tls:
    enabled: false

# Resource limits suited for Minikube
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Readiness/liveness probes point to the admin API
readinessProbe:
  httpGet:
    path: /status
    port: 8001
  initialDelaySeconds: 15
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /status
    port: 8001
  initialDelaySeconds: 30
  periodSeconds: 10
