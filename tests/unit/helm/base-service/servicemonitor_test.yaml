suite: base-service ServiceMonitor
templates:
  - templates/servicemonitor.yaml
tests:
  - it: should not render ServiceMonitor when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ServiceMonitor when enabled
    set:
      serviceMonitor.enabled: true
    asserts:
      - isKind:
          of: ServiceMonitor

  - it: should scrape /metrics by default
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].path
          value: /metrics

  - it: should have release label for Prometheus operator discovery
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: metadata.labels.release
          value: monitoring

  - it: should scrape on http port
    set:
      serviceMonitor.enabled: true
    asserts:
      - equal:
          path: spec.endpoints[0].port
          value: http

  - it: should use custom scrape path when overridden
    set:
      serviceMonitor.enabled: true
      serviceMonitor.path: /custom-metrics
    asserts:
      - equal:
          path: spec.endpoints[0].path
          value: /custom-metrics
