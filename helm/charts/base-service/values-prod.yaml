# Production defaults for base-service chart.
# Service-specific values-prod.yaml files override these.
replicaCount: 2

imagePullSecrets:
  - name: ghcr-pull-secret

image:
  pullPolicy: Always

resources:
  requests:
    cpu: 100m
    memory: 128Mi
  limits:
    cpu: 1000m
    memory: 1024Mi

hpa:
  enabled: true
  minReplicas: 2
  maxReplicas: 4
  targetCPUUtilizationPercentage: 70

podDisruptionBudget:
  enabled: true
  minAvailable: 1

persistence:
  enabled: false
  storageClass: do-block-storage
  size: 10Gi
