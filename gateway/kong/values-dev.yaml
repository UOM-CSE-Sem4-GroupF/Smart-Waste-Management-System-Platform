# Kong API Gateway — Helm Values (Local Dev)
# Chart: kong/kong
# Deployed into: gateway namespace
# Mode: DB-less (declarative config via ConfigMap)

# DB-less mode — the chart auto-sets KONG_DECLARATIVE_CONFIG
# when dblessConfig.configMap is provided
env:
  database: "off"
  kic: "off"

# Point to our ConfigMap. The chart will mount it at /kong_dbless/kong.yml
# and set KONG_DECLARATIVE_CONFIG automatically.
dblessConfig:
  configMap: kong-declarative-config

# Explicit Kong proxy image
image:
  repository: kong
  tag: "3.9"

deployment:
  kong:
    enabled: true

# Ingress Controller disabled — all routing via declarative config ConfigMap
ingressController:
  enabled: false

# Single replica for local dev
replicaCount: 1

# Expose Kong proxy via NodePort so Minikube can reach it
proxy:
  type: NodePort
  http:
    enabled: true
    nodePort: 30080
  tls:
    enabled: false

# Kong Admin API — cluster-internal only (no external exposure)
admin:
  enabled: true
  type: ClusterIP
  http:
    enabled: true
    containerPort: 8001
  tls:
    enabled: false

# Resource limits suited for Minikube
resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi

# Readiness/liveness probes point to the admin API
readinessProbe:
  httpGet:
    path: /status
    port: 8001
  initialDelaySeconds: 15
  periodSeconds: 10

livenessProbe:
  httpGet:
    path: /status
    port: 8001
  initialDelaySeconds: 30
  periodSeconds: 10
