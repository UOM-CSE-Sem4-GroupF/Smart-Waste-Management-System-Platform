apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: core-api
  namespace: argocd
spec:
  project: default
  source:
    repoURL: https://github.com/uom-cse-sem4-groupf/Platform.git
    targetRevision: main
    path: apps/core-api
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: data
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=true
