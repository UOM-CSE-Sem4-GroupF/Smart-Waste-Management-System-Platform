input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON structured logs
  if [message] =~ /^\{/ {
    json {
      source => "message"
    }
  }

  # Extract trace_id for cross-service correlation
  if [trace_id] {
    mutate {
      add_field => {
        "[@metadata][trace_id]" => "%{trace_id}"
      }
    }
  }

  # Also support X-B3-TraceId header format
  if [headers][x-b3-traceid] {
    mutate {
      add_field => { "trace_id" => "%{[headers][x-b3-traceid]}" }
    }
  }

  # Tag by service name
  if [service] {
    mutate {
      add_tag => ["service-%{service}"]
    }
  }

  # Parse timestamp
  date {
    match => ["timestamp", "ISO8601"]
    target => "@timestamp"
  }

  # Remove raw message if JSON was parsed successfully
  if "_jsonparsefailure" not in [tags] {
    mutate {
      remove_field => ["message"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    index => "microservices-logs-%{+YYYY.MM.dd}"
    document_type => "_doc"
  }

  stdout {
    codec => rubydebug
  }
}
