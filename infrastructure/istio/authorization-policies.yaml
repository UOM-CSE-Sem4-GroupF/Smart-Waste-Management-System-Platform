# =============================================================================
# RULE 15 — Prometheus → All waste-dev services (metrics scraping)
# Prometheus runs in the monitoring namespace and must scrape /metrics on
# every service. Without this rule the global deny-all blocks all scrapes.
# =============================================================================
---
apiVersion: security.istio.io/v1beta1
kind: AuthorizationPolicy
metadata:
  name: allow-prometheus-scrape
  namespace: waste-dev
spec:
  action: ALLOW
  rules:
    - from:
        - source:
            namespaces: ["monitoring"]
      to:
        - operation:
            methods: ["GET"]
            paths: ["/metrics"]
