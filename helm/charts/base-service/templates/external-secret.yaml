{{- if .Values.externalSecret.enabled -}}
# ExternalSecret: pulls credentials from HashiCorp Vault and creates a native
# Kubernetes Secret. The secret is automatically refreshed on the configured interval.
#
# Usage in values.yaml:
#   externalSecret:
#     enabled: true
#     vaultPath: swms/bin-status-service
#     data:
#       - secretKey: DB_PASSWORD
#         remoteRef:
#           key: swms/bin-status-service
#           property: db_password
apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: {{ include "base-service.fullname" . }}-secrets
  labels:
    {{- include "base-service.labels" . | nindent 4 }}
spec:
  refreshInterval: {{ .Values.externalSecret.refreshInterval | quote }}
  secretStoreRef:
    name: {{ .Values.externalSecret.secretStoreName }}
    kind: {{ .Values.externalSecret.secretStoreKind }}
  target:
    name: {{ include "base-service.fullname" . }}-secrets
    creationPolicy: Owner   # ESO owns the secret — deleted when ExternalSecret is deleted
  data:
    {{- toYaml .Values.externalSecret.data | nindent 4 }}
{{- end }}
