# Group F — Smart Waste Management System
# Platform Repository CI
# Owner: F4 Platform Team
#
# Validates all YAML, Helm chart values, K8s manifests, Argo CD Applications,
# shell scripts, and Markdown in this repo on every PR and push to main.
#
# Required status checks for branch protection on main:
#   yamllint, helm-lint, kubeconform, shellcheck,
#   helm-unittest, conftest, terraform-lint, secret-scan

name: Platform CI

on:
  pull_request:
    branches: [main]
  push:
    branches: [main]

concurrency:
  group: ${{ github.workflow }}-${{ github.ref }}
  cancel-in-progress: true

jobs:
  # ────────────────────────────────────────────────────────────────────────────
  # YAML syntax and formatting
  # ────────────────────────────────────────────────────────────────────────────
  yamllint:
    name: YAML Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run yamllint
        uses: ibiqlik/action-yamllint@v3
        with:
          config_file: .yamllint
          file_or_dir: >
            namespaces/namespaces-dev.yaml
            messaging/kafka/values-dev.yaml
            messaging/kafka/topics.yaml
            messaging/emqx/values-dev.yaml
            gateway/kong/values-dev.yaml
            gateway/kong/kong-config.yaml
            auth/keycloak/values-dev.yaml
            auth/vault/values-dev.yaml
            cicd/

  # ────────────────────────────────────────────────────────────────────────────
  # Helm values validation against upstream charts
  # ────────────────────────────────────────────────────────────────────────────
  helm-lint:
    name: Helm Lint (${{ matrix.chart.name }})
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        chart:
          - name: kafka
            repo: oci://registry-1.docker.io/bitnamicharts
            version: "32.4.3"
            values: messaging/kafka/values-dev.yaml
          - name: emqx
            repo: https://repos.emqx.io/charts
            version: "5.6.0"
            values: messaging/emqx/values-dev.yaml
          - name: kong
            repo: https://charts.konghq.com
            version: "2.48.0"
            values: gateway/kong/values-dev.yaml
          - name: keycloak
            repo: oci://registry-1.docker.io/bitnamicharts
            version: "24.4.7"
            values: auth/keycloak/values-dev.yaml
          - name: vault
            repo: https://helm.releases.hashicorp.com
            version: "0.29.1"
            values: auth/vault/values-dev.yaml

    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Add Helm repos (non-OCI charts)
        run: |
          helm repo add kong https://charts.konghq.com 2>/dev/null || true
          helm repo add hashicorp https://helm.releases.hashicorp.com 2>/dev/null || true
          helm repo add emqx https://repos.emqx.io/charts 2>/dev/null || true
          helm repo update

      - name: Pull chart ${{ matrix.chart.name }}
        run: |
          REPO="${{ matrix.chart.repo }}"
          NAME="${{ matrix.chart.name }}"
          VERSION="${{ matrix.chart.version }}"

          if [[ "$REPO" == oci://* ]]; then
            helm pull "${REPO}/${NAME}" \
              --version "${VERSION}" \
              --untar --untardir /tmp/charts
          else
            helm pull "${NAME}" \
              --repo "${REPO}" \
              --version "${VERSION}" \
              --untar --untardir /tmp/charts
          fi

      - name: Lint ${{ matrix.chart.name }} values
        run: |
          helm lint /tmp/charts/${{ matrix.chart.name }} \
            --values ${{ matrix.chart.values }}

  # ────────────────────────────────────────────────────────────────────────────
  # Kubernetes manifest schema validation
  # ────────────────────────────────────────────────────────────────────────────
  kubeconform:
    name: Kubeconform
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Install kubeconform
        run: |
          curl -sSL \
            https://github.com/yannh/kubeconform/releases/latest/download/kubeconform-linux-amd64.tar.gz \
            | tar xz
          sudo mv kubeconform /usr/local/bin/

      - name: Validate K8s manifests
        run: |
          # Validate plain K8s manifests (namespaces, Kafka topics Job, Kong ConfigMap)
          find namespaces messaging/kafka/topics.yaml gateway/kong/kong-config.yaml \
            auth/keycloak/realm-configmap.yaml auth/vault/vault-policies.yaml \
            -name "*.yaml" 2>/dev/null | \
          kubeconform \
            -strict \
            -summary \
            -kubernetes-version 1.29.0 \
            -schema-location default \
            -schema-location 'https://raw.githubusercontent.com/datreeio/CRDs-catalog/main/{{.Group}}/{{.ResourceKind}}_{{.ResourceAPIVersion}}.json' \
            -ignore-missing-schemas

  # ────────────────────────────────────────────────────────────────────────────
  # Shell script static analysis
  # ────────────────────────────────────────────────────────────────────────────
  shellcheck:
    name: ShellCheck
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Run ShellCheck
        uses: ludeeus/action-shellcheck@master
        with:
          scandir: ./scripts
          severity: warning
          check_together: yes

  # ────────────────────────────────────────────────────────────────────────────
  # Markdown link checking
  # ────────────────────────────────────────────────────────────────────────────
  markdown-links:
    name: Markdown Links
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: gaurav-nelson/github-action-markdown-link-check@v1
        with:
          use-quiet-mode: "yes"
          use-verbose-mode: "no"
          check-modified-files-only: "no"
          config-file: ".github/mlc-config.json"
        continue-on-error: true  # Non-blocking — external links may be temporarily down

  # ────────────────────────────────────────────────────────────────────────────
  # Helm unit tests for the base-service chart
  # ────────────────────────────────────────────────────────────────────────────
  helm-unittest:
    name: Helm Unit Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Install helm-unittest plugin
        run: helm plugin install https://github.com/helm-unittest/helm-unittest

      - name: Run base-service chart unit tests
        run: |
          helm unittest helm/charts/base-service/ \
            --file "tests/*.yaml" \
            --output-type Standard

  # ────────────────────────────────────────────────────────────────────────────
  # OPA/Conftest policy tests on rendered Helm output
  # ────────────────────────────────────────────────────────────────────────────
  conftest:
    name: Conftest Policy Tests
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: azure/setup-helm@v4
        with:
          version: v3.17.0

      - name: Install conftest
        run: |
          curl -sSL \
            https://github.com/open-policy-agent/conftest/releases/download/v0.56.0/conftest_0.56.0_Linux_x86_64.tar.gz \
            | tar xz
          sudo mv conftest /usr/local/bin/

      - name: Render base-service chart
        # Use a pinned tag to simulate what Argo CD deploys (never :latest in prod)
        run: |
          helm template swms-svc helm/charts/base-service/ \
            --set image.tag=1.0.0 \
            > /tmp/base-service-rendered.yaml

      - name: Run policy tests
        run: |
          conftest test /tmp/base-service-rendered.yaml \
            --policy policy/

  # ────────────────────────────────────────────────────────────────────────────
  # Terraform formatting and validation
  # ────────────────────────────────────────────────────────────────────────────
  terraform-lint:
    name: Terraform Lint
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: hashicorp/setup-terraform@v3
        with:
          terraform_version: "~1.7"

      - name: Check Terraform formatting
        run: terraform fmt -check -recursive terraform/do/

      - name: Terraform init (syntax check only — no backend)
        run: terraform -chdir=terraform/do init -backend=false

      - name: Terraform validate
        run: terraform -chdir=terraform/do validate

      - name: Install tflint
        run: |
          curl -sSL \
            https://github.com/terraform-linters/tflint/releases/latest/download/tflint_linux_amd64.zip \
            -o tflint.zip
          unzip tflint.zip && sudo mv tflint /usr/local/bin/

      - name: Run tflint
        run: |
          cd terraform/do
          tflint --init
          tflint

  # ────────────────────────────────────────────────────────────────────────────
  # Secret scanning — blocks PRs that accidentally commit real credentials
  # ────────────────────────────────────────────────────────────────────────────
  secret-scan:
    name: Secret Scan
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
        with:
          fetch-depth: 0  # Full history so gitleaks can scan all commits in the PR

      - uses: gitleaks/gitleaks-action@v2
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
