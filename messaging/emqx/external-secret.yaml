apiVersion: external-secrets.io/v1beta1
kind: ExternalSecret
metadata:
  name: emqx-credentials
  namespace: messaging
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: emqx-credentials
    creationPolicy: Owner
  data:
    - secretKey: default-username
      remoteRef:
        key: swms/emqx
        property: dashboard_username
    - secretKey: default-password
      remoteRef:
        key: swms/emqx
        property: dashboard_password
    - secretKey: sensor-password
      remoteRef:
        key: swms/emqx
        property: sensor_password
    - secretKey: edge-password
      remoteRef:
        key: swms/emqx
        property: edge_password
    - secretKey: admin-password
      remoteRef:
        key: swms/emqx
        property: admin_password
