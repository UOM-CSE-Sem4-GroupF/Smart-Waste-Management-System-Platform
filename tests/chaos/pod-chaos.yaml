# Chaos Mesh — Pod Chaos Experiments
# Goal: Prove the system remains consistent when API pods are killed.
#
# Apply: kubectl apply -f tests/chaos/pod-chaos.yaml -n waste-dev
# Watch: kubectl get podchaos -n waste-dev
# Dashboard: http://localhost:2333 (kubectl port-forward svc/chaos-dashboard 2333:2333 -n chaos-mesh)
#
# Run one experiment at a time. Each is independently named so they can be
# applied/deleted without affecting each other.

---
# EXPERIMENT 1 — Kill one orchestrator pod every 2 minutes
# Expected: Kubernetes restarts it within ~30s; Kong routes recover automatically.
# Pass criteria: no 5xx errors on /api/v1/jobs for more than 60s.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: orchestrator-pod-kill
  namespace: waste-dev
  labels:
    app: chaos-testing
    experiment: pod-kill
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - waste-dev
    labelSelectors:
      app.kubernetes.io/instance: orchestrator
  scheduler:
    cron: "@every 2m"

---
# EXPERIMENT 2 — Kill one bin-status pod every 2 minutes
# Expected: Orchestrator retries its BIN_STATUS_URL call; bins show stale data
# briefly, then recover once the pod restarts.
# Pass criteria: no data loss in postgres-waste; Kafka lag does not grow.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: bin-status-pod-kill
  namespace: waste-dev
  labels:
    app: chaos-testing
    experiment: pod-kill
spec:
  action: pod-kill
  mode: one
  selector:
    namespaces:
      - waste-dev
    labelSelectors:
      app.kubernetes.io/instance: bin-status
  scheduler:
    cron: "@every 2m"

---
# EXPERIMENT 3 — Container kill (SIGKILL) on core-api every 3 minutes
# Harder than pod-kill: the container dies but the pod object stays, so
# Kubernetes must detect the crash and restart the container. Tests the
# liveness probe response time.
# Pass criteria: /data-analysis/health returns 200 within 30s of kill.
apiVersion: chaos-mesh.org/v1alpha1
kind: PodChaos
metadata:
  name: core-api-container-kill
  namespace: waste-dev
  labels:
    app: chaos-testing
    experiment: container-kill
spec:
  action: container-kill
  mode: one
  selector:
    namespaces:
      - waste-dev
    labelSelectors:
      app.kubernetes.io/instance: core-api
  containerNames:
    - core-api-base-service
  scheduler:
    cron: "@every 3m"
