input {
  beats {
    port => 5044
  }
  tcp {
    port => 5000
    codec => json_lines
  }
}

filter {
  # Parse JSON structured logs from all microservices
  if [message] =~ /^\{/ {
    json {
      source => "message"
      target => "parsed"
    }

    # Promote all required fields to the top level
    mutate {
      rename => {
        "[parsed][timestamp]" => "timestamp"
        "[parsed][level]"     => "level"
        "[parsed][service]"   => "service"
        "[parsed][message]"   => "log_message"
        "[parsed][traceId]"   => "traceId"
      }
      remove_field => ["parsed", "message"]
    }
  }

  # Normalise level to uppercase (services emit "info", "INFO", "warn", etc.)
  if [level] {
    mutate { uppercase => ["level"] }
  }

  # Extract traceId from B3 propagation header if not present in the log body
  if ![traceId] and [headers][x-b3-traceid] {
    mutate {
      add_field => { "traceId" => "%{[headers][x-b3-traceid]}" }
    }
  }

  # Tag by service name for Kibana index filtering
  if [service] {
    mutate {
      add_tag => ["service-%{service}"]
    }
  }

  # Parse ISO8601 timestamp — covers Node.js, Python, and Java log formats
  if [timestamp] {
    date {
      match => ["timestamp", "ISO8601"]
      target => "@timestamp"
      remove_field => ["timestamp"]
    }
  }
}

output {
  elasticsearch {
    hosts => ["elasticsearch:9200"]
    # Daily index with ILM — 30-day retention managed by swms-30day-retention policy
    index => "swms-logs-%{+YYYY.MM.dd}"
    ilm_enabled => true
    ilm_rollover_alias => "swms-logs"
    ilm_policy => "swms-30day-retention"
    document_type => "_doc"
  }

  # Only echo ERROR/WARN to stdout to reduce noise in Logstash pod logs
  if [level] in ["ERROR", "WARN"] {
    stdout { codec => rubydebug }
  }
}
