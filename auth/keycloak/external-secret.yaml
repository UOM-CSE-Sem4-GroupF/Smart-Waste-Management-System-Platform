apiVersion: external-secrets.io/v1
kind: ExternalSecret
metadata:
  name: keycloak-credentials
  namespace: auth
spec:
  refreshInterval: "1h"
  secretStoreRef:
    name: vault-backend
    kind: ClusterSecretStore
  target:
    name: keycloak-credentials
    creationPolicy: Owner
  data:
    - secretKey: admin-password
      remoteRef:
        key: swms/keycloak
        property: admin_password
    - secretKey: postgres-password
      remoteRef:
        key: swms/postgres
        property: postgres_password
    - secretKey: password
      remoteRef:
        key: swms/postgres
        property: keycloak_db_password
