# F2 Application Services (DigitalOcean)
# InfluxDB 2.7 — influxdata/influxdb2 chart
# Namespace: waste-dev
#
# Switched from bitnami/influxdb (image unavailable on Docker Hub) to
# influxdata/influxdb2 which uses the official influxdb:2.7.4-alpine image.

adminUser:
  organization: waste-org
  bucket: waste-bootstrap
  user: admin
  password: "admin12345"
  token: "my-super-token"

persistence:
  enabled: true
  storageClass: do-block-storage
  size: 8Gi

resources:
  requests:
    cpu: 100m
    memory: 256Mi
  limits:
    cpu: 500m
    memory: 512Mi
