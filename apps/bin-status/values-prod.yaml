# Production overrides for bin-status (Node.js, port 3002).
# Critical service — 3 replicas minimum.
base-service:
  imagePullSecrets:
    - name: ghcr-pull-secret

  image:
    repository: ghcr.io/uom-cse-sem4-groupf/bin-status
    tag: latest
    pullPolicy: Always

  replicaCount: 3

  service:
    port: 3002

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  livenessProbe:
    enabled: true
    httpGet:
      port: 3002
      path: /health

  readinessProbe:
    enabled: true
    httpGet:
      port: 3002
      path: /ready

  env:
    PORT: "3002"
    NODE_ENV: "production"
    KAFKA_BROKER: "kafka.messaging.svc.cluster.local:9092"
    DATA_ANALYSIS_URL: "http://core-api-base-service.waste-prod.svc.cluster.local:8001"
    NOTIFICATION_URL: "http://notification-base-service.waste-prod.svc.cluster.local:3004"

  externalSecret:
    enabled: true
    vaultPath: swms/kafka
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    data:
      - secretKey: KAFKA_USER
        remoteRef: { key: swms/kafka, property: sasl_username }
      - secretKey: KAFKA_PASS
        remoteRef: { key: swms/kafka, property: sasl_password }
