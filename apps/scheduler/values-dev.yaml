# Inherited from base-service
base-service:
  imagePullSecrets:
    - name: ghcr-pull-secret
  image:
    repository: ghcr.io/uom-cse-sem4-groupf/scheduler
    tag: latest
  service:
    port: 3003
  livenessProbe:
    enabled: true
    httpGet:
      port: 3003
      path: /health
  readinessProbe:
    enabled: true
    httpGet:
      port: 3003
      path: /ready

  env:
    PORT: "3003"
    KAFKA_BROKER: "kafka.messaging.svc.cluster.local:9092"

  externalSecret:
    enabled: true
    vaultPath: swms/kafka
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    data:
      - secretKey: KAFKA_USER
        remoteRef: { key: swms/kafka, property: sasl_username }
      - secretKey: KAFKA_PASS
        remoteRef: { key: swms/kafka, property: sasl_password }
