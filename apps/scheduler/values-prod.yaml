# Production overrides for scheduler (Node.js, port 3003).
# Critical service — 3 replicas minimum.
base-service:
  imagePullSecrets:
    - name: ghcr-pull-secret

  image:
    repository: ghcr.io/uom-cse-sem4-groupf/scheduler
    tag: latest
    pullPolicy: Always

  replicaCount: 3

  service:
    port: 3003

  resources:
    requests:
      cpu: 100m
      memory: 128Mi
    limits:
      cpu: 1000m
      memory: 1024Mi

  hpa:
    enabled: true
    minReplicas: 3
    maxReplicas: 6
    targetCPUUtilizationPercentage: 70

  podDisruptionBudget:
    enabled: true
    minAvailable: 2

  livenessProbe:
    enabled: true
    httpGet:
      port: 3003
      path: /health

  readinessProbe:
    enabled: true
    httpGet:
      port: 3003
      path: /ready

  command: ["/bin/sh", "-c"]
  args: ["export DATABASE_URL=postgresql://waste_admin:${POSTGRES_PASSWORD}@postgres-waste-postgresql.waste-dev.svc.cluster.local:5432/waste_management?schema=f3 && node dist/index.js"]

  env:
    PORT: "3003"
    NODE_ENV: "production"
    KAFKA_BROKER: "kafka.messaging.svc.cluster.local:9092"

  externalSecret:
    enabled: true
    vaultPath: swms/kafka
    secretStoreName: vault-backend
    secretStoreKind: ClusterSecretStore
    data:
      - secretKey: KAFKA_USER
        remoteRef: { key: swms/kafka, property: sasl_username }
      - secretKey: KAFKA_PASS
        remoteRef: { key: swms/kafka, property: sasl_password }
      - secretKey: POSTGRES_PASSWORD
        remoteRef: { key: swms/postgres-waste, property: password }
