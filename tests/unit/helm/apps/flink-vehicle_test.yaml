suite: flink-vehicle chart values
templates:
  - charts/base-service/templates/deployment.yaml
  - charts/base-service/templates/external-secret.yaml
values:
  - values-dev.yaml
tests:
  - it: should use flink-processor image repository
    template: charts/base-service/templates/deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "ghcr.io/uom-cse-sem4-groupf/flink-processor:.*"

  - it: should expose port 8080
    template: charts/base-service/templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 8080

  - it: should run job_vehicle.py
    template: charts/base-service/templates/deployment.yaml
    asserts:
      - contains:
          path: spec.template.spec.containers[0].args
          content: job_vehicle.py

  - it: should render ExternalSecret
    template: charts/base-service/templates/external-secret.yaml
    asserts:
      - isKind:
          of: ExternalSecret
