apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: istio-security
  namespace: cicd
  labels:
    project: group-f-swms
    managed-by: f4-platform
    component: networking
  annotations:
    argocd.argoproj.io/sync-wave: "5" # Apply after istiod is ready
spec:
  project: platform
  source:
    repoURL: https://github.com/UOM-CSE-Sem4-GroupF/group-f-platform
    targetRevision: main
    path: infrastructure/istio
  destination:
    server: https://kubernetes.default.svc
    namespace: istio-system
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
