# Inherited from base-service
base-service:
  imagePullSecrets:
    - name: ghcr-pull-secret
  image:
    repository: ghcr.io/uom-cse-sem4-groupf/airflow
    tag: latest
  service:
    port: 8080
  livenessProbe:
    enabled: true
    httpGet:
      port: 8080
      path: /
  readinessProbe:
    enabled: true
    httpGet:
      port: 8080
      path: /
