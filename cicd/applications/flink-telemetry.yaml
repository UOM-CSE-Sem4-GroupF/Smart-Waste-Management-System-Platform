# Group F — Smart Waste Management System
# Argo CD Application: flink-telemetry
# Owner: F4 Platform Team
#
# Pipeline 1: Bin Telemetry Processor
# Consumes from: waste.bin.telemetry
# Produces to: waste.bin.processed

apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: flink-telemetry
  namespace: cicd
  labels:
    project: group-f-swms
    managed-by: f4-platform
  annotations:
    # ── Image Updater annotations ──────────────────────────────────────
    argocd-image-updater.argoproj.io/image-list: app=ghcr.io/uom-cse-sem4-groupf/flink-processor
    argocd-image-updater.argoproj.io/app.update-strategy: latest
    argocd-image-updater.argoproj.io/write-back-method: git:secret:cicd/argocd-image-updater-ssh
    argocd-image-updater.argoproj.io/write-back-target: helmvalues:apps/flink-telemetry/values-dev.yaml
spec:
  project: services
  source:
    repoURL: https://github.com/UOM-CSE-Sem4-GroupF/Smart-Waste-Management-System-Platform
    targetRevision: main
    path: apps/flink-telemetry
    helm:
      valueFiles:
        - values-dev.yaml
  destination:
    server: https://kubernetes.default.svc
    namespace: waste-dev
  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
