# EMQX MQTT Broker — Helm Value Overrides for DOKS
# Layered on top of values-dev.yaml:
#   helm upgrade --install emqx emqx/emqx -n messaging \
#     -f ./messaging/emqx/values-dev.yaml \
#     -f ./messaging/emqx/values-doks.yaml
#
# Key changes:
#   1. Service: LoadBalancer (instead of NodePort) — DOKS provisions a public DO LB.
#      F1 ESP32 devices and Node-RED edge gateways connect to port 1883 on the LB IP.
#   2. Dashboard stays on port 18083 but is NOT in the LB — access via port-forward.

service:
  type: LoadBalancer
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-name: "swms-emqx-mqtt"
    # Expose only the MQTT port (1883) on the public LB — dashboard stays internal
    service.beta.kubernetes.io/do-loadbalancer-allow-rules: "port:1883,protocol:tcp"

persistence:
  storageClass: do-block-storage
  size: 1Gi
