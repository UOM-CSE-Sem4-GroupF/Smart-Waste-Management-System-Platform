# Keycloak — Helm Values (Local Dev)
# Chart: bitnami/keycloak (via OCI registry)
# Deployed into: auth namespace
# Realm: waste-management (imported from realm-export.json at startup)

# ─── Image Registry ──────────────────────────────────────────
# Use ECR for Keycloak (same fix as Kafka — Docker Hub pulls fail)
global:
  security:
    allowInsecureImages: true

image:
  registry: public.ecr.aws
  repository: bitnami/keycloak

# ─── Admin Credentials ───────────────────────────────────────
auth:
  adminUser: admin
  existingSecret: "keycloak-credentials"

# ─── Realm Import ────────────────────────────────────────────
# Import the waste-management realm automatically on first startup
extraStartupArgs: "--import-realm"

extraVolumes:
  - name: realm-config
    configMap:
      name: keycloak-realm-config

extraVolumeMounts:
  - name: realm-config
    mountPath: /opt/bitnami/keycloak/data/import

# ─── Replica Count ───────────────────────────────────────────
replicaCount: 1

# ─── PostgreSQL (Bundled Sub-Chart) ──────────────────────────
# Let the Bitnami chart deploy its own Postgres. This is the simplest
# approach — the chart wires up KC_DB_URL, KC_DB_USERNAME, etc. automatically.
postgresql:
  enabled: true
  image:
    registry: public.ecr.aws
    repository: bitnami/postgresql
  auth:
    existingSecret: "keycloak-credentials"
  primary:
    persistence:
      size: 1Gi
    resources:
      requests:
        cpu: 50m
        memory: 128Mi
      limits:
        cpu: 250m
        memory: 256Mi

# ─── Dev Mode ────────────────────────────────────────────────
# Run in development mode (start-dev) — no strict hostname or HTTPS checks
production: false

# ─── Reverse Proxy Config ────────────────────────────────────
# Keycloak sits behind Kong. KC_PROXY=edge tells it to trust
# X-Forwarded-For / X-Forwarded-Proto from Kong.
# httpRelativePath makes Keycloak serve at /auth/... so Kong's
# strip_path: false route works without path rewriting.
httpRelativePath: "/auth"

extraEnvVars:
  - name: KC_PROXY
    value: edge

# ─── Networking ──────────────────────────────────────────────
# Expose via NodePort so Minikube can reach it
service:
  type: LoadBalancer
  ports:
    http: 80
  nodePorts:
    http: "30180"
  annotations:
    service.beta.kubernetes.io/do-loadbalancer-name: "swms-keycloak"

# ─── Resource Limits ─────────────────────────────────────────
# Keycloak is JVM-based — needs a bit more RAM
resources:
  requests:
    cpu: 200m
    memory: 512Mi
  limits:
    cpu: 1000m
    memory: 1Gi
