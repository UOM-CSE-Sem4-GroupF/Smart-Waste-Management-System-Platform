# Keycloak — Helm Value Overrides for DOKS
# Layered on top of values-dev.yaml:
#   helm upgrade --install keycloak oci://registry-1.docker.io/bitnamicharts/keycloak \
#     -n auth \
#     -f ./auth/keycloak/values-dev.yaml \
#     -f ./auth/keycloak/values-doks.yaml
#
# Key changes:
#   1. Image registry: public.ecr.aws → docker.io (ECR occasionally throttles non-AWS pulls)
#   2. Service: ClusterIP (not exposed publicly; accessed via Kong in production)
#   3. Proxy: edge (Keycloak is behind Kong gateway)
#   4. Hostname: 139.59.219.173 (The public IP of the Kong LoadBalancer)
#   5. Relative Path: /auth/ (Trailing slash prevents broken readiness probe construction)

production: true
proxy: edge
httpRelativePath: /auth/
hostname: 139.59.219.173

service:
  type: ClusterIP
  ports:
    http: 80


postgresql:
  primary:
    persistence:
      storageClass: do-block-storage
      size: 1Gi
