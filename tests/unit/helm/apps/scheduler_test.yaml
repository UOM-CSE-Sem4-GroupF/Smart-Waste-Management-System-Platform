suite: scheduler chart values
templates:
  - charts/base-service/templates/deployment.yaml
  - charts/base-service/templates/external-secret.yaml
values:
  - values-dev.yaml
tests:
  - it: should use scheduler image repository
    template: charts/base-service/templates/deployment.yaml
    asserts:
      - matchRegex:
          path: spec.template.spec.containers[0].image
          pattern: "ghcr.io/uom-cse-sem4-groupf/scheduler:.*"

  - it: should expose port 3003
    template: charts/base-service/templates/deployment.yaml
    asserts:
      - equal:
          path: spec.template.spec.containers[0].ports[0].containerPort
          value: 3003

  - it: should render ExternalSecret for Kafka credentials
    template: charts/base-service/templates/external-secret.yaml
    asserts:
      - isKind:
          of: ExternalSecret
