# Keycloak Realm ConfigMap
# Mounts realm-export.json into Keycloak's /data/import directory.
# Keycloak will automatically import this realm on first startup.
#
# Applied via setup-local.sh (step 7)
# Owner: F4 Platform Team

apiVersion: v1
kind: ConfigMap
metadata:
  name: keycloak-realm-config
  namespace: auth
  labels:
    project: group-f-swms
    managed-by: f4-platform
data:
  # Populated at deploy time by setup-local.sh:
  #   kubectl create configmap keycloak-realm-config \
  #     --from-file=waste-management-realm.json=./auth/keycloak/realm-export.json
  # This placeholder keeps kubeconform happy; the real content is in realm-export.json.
  waste-management-realm.json: |-
    {}
