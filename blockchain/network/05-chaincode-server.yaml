# Group F SWMS — Chaincode-as-a-Service (CCaaS) Server
# Owner: F4 Platform Team
#
# Runs the collection-record chaincode as a standalone K8s Deployment.
# The peer dials this service over gRPC on port 7052 to execute transactions.
# This is the Fabric 2.4+ recommended approach for K8s-native chaincode.
#
# CHAINCODE_ID is injected by the chaincode deploy Job (06-chaincode-deploy-job.yaml)
# after `peer lifecycle chaincode install` returns the package ID.
# Until CHAINCODE_ID is set, the chaincode server will exit and restart — that is expected.
#
# Image: built from blockchain/chaincode/Dockerfile
# Placeholder image below — replace with your actual registry image after `docker build`.
#
# Apply AFTER 04-channel-setup-job completes:
#   kubectl apply -f blockchain/network/05-chaincode-server.yaml

---
apiVersion: apps/v1
kind: Deployment
metadata:
  name: collection-record-cc
  namespace: blockchain
  labels:
    project: group-f-swms
    managed-by: f4-platform
    app: collection-record-cc
    component: chaincode
spec:
  replicas: 1
  selector:
    matchLabels:
      app: collection-record-cc
  template:
    metadata:
      labels:
        app: collection-record-cc
        component: chaincode
    spec:
      imagePullSecrets:
        - name: ghcr-pull-secret
      containers:
        - name: chaincode
          image: ghcr.io/uom-cse-sem4-groupf/collection-record-cc:1.0
          imagePullPolicy: Always
          ports:
            - containerPort: 7052
              name: chaincode-grpc
          env:
            - name: CHAINCODE_SERVER_ADDRESS
              value: "0.0.0.0:7052"
            # CHAINCODE_ID is patched by 06-chaincode-deploy-job.yaml after install.
            # Set a placeholder here; the job updates it with the real package ID.
            - name: CHAINCODE_ID
              value: "collection-record_1.0:placeholder"
            - name: CHAINCODE_TLS_DISABLED
              value: "true"
          resources:
            requests:
              memory: 64Mi
              cpu: 50m
            limits:
              memory: 128Mi
              cpu: 200m
          livenessProbe:
            tcpSocket:
              port: 7052
            initialDelaySeconds: 10
            periodSeconds: 10
          readinessProbe:
            tcpSocket:
              port: 7052
            initialDelaySeconds: 5
            periodSeconds: 5

---
apiVersion: v1
kind: Service
metadata:
  name: collection-record-cc
  namespace: blockchain
  labels:
    project: group-f-swms
    managed-by: f4-platform
    app: collection-record-cc
spec:
  selector:
    app: collection-record-cc
  ports:
    - name: chaincode-grpc
      port: 7052
      targetPort: 7052
