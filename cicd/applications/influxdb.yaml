apiVersion: argoproj.io/v1alpha1
kind: Application
metadata:
  name: influxdb
  namespace: cicd
  labels:
    project: group-f-swms
    managed-by: f4-platform
    component: waste-dev
  annotations:
    argocd.argoproj.io/sync-wave: "10"
spec:
  project: platform

  sources:
    - repoURL: https://helm.influxdata.com/
      chart: influxdb2
      targetRevision: "2.1.2"
      helm:
        releaseName: influxdb
        valueFiles:
          - $values/waste-dev/influxdb/values-dev.yaml

    - repoURL: https://github.com/UOM-CSE-Sem4-GroupF/Smart-Waste-Management-System-Platform
      targetRevision: main
      ref: values

  destination:
    server: https://kubernetes.default.svc
    namespace: waste-dev

  syncPolicy:
    automated:
      prune: true
      selfHeal: true
    syncOptions:
      - CreateNamespace=false
      - ServerSideApply=true
