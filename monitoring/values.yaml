# values.yaml
# Helm configuration for kube-prometheus-stack
# Deployed in the monitoring namespace
# F4 Platform Team — Smart Waste Management System

grafana:
  enabled: true
  adminPassword: "admin"

  defaultDashboardsEnabled: true
  defaultDashboardsTimezone: "Asia/Colombo"

  service:
    type: ClusterIP
    port: 80

  persistence:
    enabled: true
    storageClassName: do-block-storage
    size: 1Gi

  resources:
    requests:
      cpu: 50m
      memory: 128Mi
    limits:
      cpu: 200m
      memory: 256Mi

prometheus:
  enabled: true

  prometheusSpec:
    retention: 15d

    storageSpec:
      volumeClaimTemplate:
        spec:
          storageClassName: do-block-storage
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 5Gi

    scrapeInterval: "30s"
    evaluationInterval: "30s"

    resources:
      requests:
        cpu: 100m
        memory: 512Mi
      limits:
        cpu: 500m
        memory: 1Gi

alertmanager:
  enabled: true

  alertmanagerSpec:
    storage:
      volumeClaimTemplate:
        spec:
          storageClassName: do-block-storage
          accessModes: ["ReadWriteOnce"]
          resources:
            requests:
              storage: 1Gi

# Kubernetes component monitoring
kubeStateMetrics:
  enabled: true

nodeExporter:
  enabled: true

# Control plane components not accessible on managed DOKS — disable their
# scrape services to avoid kube-system namespace permission errors in Argo CD.
kubeScheduler:
  enabled: false
kubeControllerManager:
  enabled: false
kubeProxy:
  enabled: false
kubeEtcd:
  enabled: false
coreDns:
  enabled: true

# Waste Management Custom Alert Rules
additionalPrometheusRulesMap:
  waste-management-alerts:
    groups:
      - name: waste.critical
        rules:
          # Alert: Bin is 100% full but no lorry is coming
          - alert: BinOverflow
            expr: waste_bins_urgent_total{status="critical"} > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Bin overflow detected"
              description: "A bin is critically full with no active collection job."

          # Alert: Kafka is falling behind processing sensor data
          - alert: KafkaConsumerLagHigh
            expr: kafka_consumer_lag > 10000
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Kafka consumer lag too high"
              description: "F2 stream processing is falling behind. Lag is above 10,000 messages."

          # Alert: A service pod is crash looping
          - alert: PodCrashLooping
            expr: rate(kube_pod_container_status_restarts_total{namespace=~"waste-.*"}[15m]) > 0
            for: 5m
            labels:
              severity: critical
            annotations:
              summary: "Pod is crash looping"
              description: "A pod in the waste management namespace is repeatedly crashing."

      - name: waste.warning
        rules:
          # Alert: No sensor readings from a zone for 30+ minutes
          - alert: ZoneSensorOutage
            expr: time() - waste_zone_last_reading_timestamp > 1800
            for: 5m
            labels:
              severity: warning
            annotations:
              summary: "Zone sensor outage"
              description: "No sensor readings received from a zone for over 30 minutes."

          # Alert: No driver found for a job — needs supervisor
          - alert: CollectionJobEscalated
            expr: waste_collection_jobs_active{status="escalated"} > 0
            for: 1m
            labels:
              severity: warning
            annotations:
              summary: "Collection job escalated"
              description: "A collection job has been escalated — no driver found after retries."

          # Alert: Lorry went off its planned route
          - alert: VehicleDeviation
            expr: waste_vehicle_deviation_meters > 500
            for: 2m
            labels:
              severity: warning
            annotations:
              summary: "Vehicle off route"
              description: "A lorry has deviated more than 500m from its planned collection route."
