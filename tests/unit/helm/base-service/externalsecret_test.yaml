suite: base-service ExternalSecret
templates:
  - templates/external-secret.yaml
tests:
  - it: should not render ExternalSecret when disabled (default)
    asserts:
      - hasDocuments:
          count: 0

  - it: should render ExternalSecret when enabled
    set:
      externalSecret.enabled: true
      externalSecret.vaultPath: swms/test-service
      externalSecret.data:
        - secretKey: TEST_KEY
          remoteRef:
            key: swms/test-service
            property: test_value
    asserts:
      - isKind:
          of: ExternalSecret

  - it: should reference vault-backend ClusterSecretStore
    set:
      externalSecret.enabled: true
      externalSecret.vaultPath: swms/test-service
      externalSecret.data: []
    asserts:
      - equal:
          path: spec.secretStoreRef.name
          value: vault-backend
      - equal:
          path: spec.secretStoreRef.kind
          value: ClusterSecretStore

  - it: should use Owner creation policy so secret is deleted with ExternalSecret
    set:
      externalSecret.enabled: true
      externalSecret.vaultPath: swms/test-service
      externalSecret.data: []
    asserts:
      - equal:
          path: spec.target.creationPolicy
          value: Owner

  - it: should use external-secrets.io/v1 API
    set:
      externalSecret.enabled: true
      externalSecret.vaultPath: swms/test-service
      externalSecret.data: []
    asserts:
      - equal:
          path: apiVersion
          value: external-secrets.io/v1
